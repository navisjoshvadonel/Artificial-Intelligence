<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AeroRoute | Autonomous Logistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #0066FF;
            --primary-dark: #0052CC;
            --secondary: #00D1FF;
            --dark: #0A192F;
            --dark-lighter: #112240;
            --text-light: #CCD6F6;
            --text-muted: #8892B0;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        .navbar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        .navbar {
            background: rgba(10, 25, 47, 0.85) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
        }

        .navbar-brand {
            color: var(--white) !important;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .navbar-brand i {
            color: var(--secondary);
            filter: drop-shadow(0 0 8px rgba(0, 209, 255, 0.5));
        }

        .navbar-text-center {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .user-pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--secondary);
            margin-right: 15px;
        }

        .btn-logout {
            color: #FF4D4D;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            color: #FF1A1A;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        /* Hero / Background Elements */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 10%, rgba(0, 102, 255, 0.1), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 209, 255, 0.05), transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .container-fluid {
            max-width: 1600px;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid px-lg-5">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
                <i class="fas fa-drone-alt me-3 fa-lg"></i>
                <span>AERO<span style="color: var(--secondary)">ROUTE</span></span>
            </a>

            <div class="navbar-text-center d-none d-lg-block mx-auto">
                <i class="fas fa-signal me-2"></i> Satellite Link Active
            </div>

            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                <div class="user-pill">
                    <i class="fas fa-user-shield me-2"></i> {{ user.username|upper }}
                </div>
                <a href="{% url 'logout' %}" class="btn-logout">
                    <i class="fas fa-power-off"></i>
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid px-lg-5" style="margin-top: 100px; padding-bottom: 50px;">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
